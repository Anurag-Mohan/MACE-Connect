<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directory - MACE-Connect</title>
  
  <link href="/static/css/design-system.css" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="/static/js/firebase-client.js"></script>
</head>
<body>

  <!-- Loading State -->
  <div id="loadingOverlay" style="position:fixed; top:0; left:0; right:0; bottom:0; background:var(--bg-page); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1rem;">
    <div class="spinner"></div>
    <p class="text-sm fw-600">Loading Directory...</p>
  </div>

  <div class="page-wrapper animate-slide-up" style="display: none;" id="appWrapper">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div>
        <a href="#" class="sidebar-logo mb-8" onclick="showDepartments()">
          <span class="dot"></span>MACE-Connect
        </a>
        
        <ul class="nav-menu" id="deptNavList">
          <li>
            <button class="nav-item active" onclick="showStaffList('All Departments')">
              All Departments
            </button>
          </li>
          <!-- Department Links will be injected here -->
        </ul>
      </div>
      
      <div class="mt-8">
        <p class="text-xs mb-4">User Session</p>
        <p class="text-sm font-medium mb-4 text-truncate" id="userSpan"></p>
        <div id="adminBadgeContainer" class="mb-4" style="display:none;">
          <span class="badge badge-gold">Administrator</span>
        </div>
        <button class="btn btn-outline w-100 mb-4" id="adminControlsBtn" style="display:none;" onclick="window.location.href='/admin.html'">
          Admin Console
        </button>
        <button class="btn btn-outline w-100" id="signoutBtn" onclick="firebase.auth().signOut().then(() => window.location.href='/login.html')">
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      
      <!-- Departments Overview Grid -->
      <div id="departmentsView">
        <div class="d-flex align-items-center justify-content-between mb-8">
          <div>
            <h1 class="text-h2">Directory Overview</h1>
            <p class="text-body mt-2">Select a department to view staff members.</p>
          </div>
          
          <div class="form-group" style="margin-bottom:0; width: 300px;">
            <input type="text" class="input-field" placeholder="Search any name..." id="globalSearchInput" oninput="handleGlobalSearch(this.value)">
          </div>
        </div>
        
        <div class="staff-grid" id="departmentsGrid">
          <!-- Department cards injected here -->
        </div>
      </div>
      
      <!-- Staff List View -->
      <div id="staffView" style="display: none;">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-4 mb-8">
          <div>
            <button class="btn btn-icon mb-4" onclick="showDepartments()">
              <!-- SVG Back Icon -->
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <h1 class="text-h2" id="departmentTitle">Department</h1>
            <p class="text-body mt-2"><span id="staffCountBadge" class="badge badge-neutral">0</span> Members</p>
          </div>
          
          <div class="d-flex align-items-center gap-4 flex-wrap">
            <div class="form-group" style="margin-bottom:0; width: 260px;">
              <input type="text" class="input-field" placeholder="Filter by name..." id="staffSearchInput" oninput="filterStaff()">
            </div>
            
            <div class="form-group" style="margin-bottom:0; width: 200px;">
              <select class="input-field" id="typeFilter" onchange="filterStaff()">
                <option value="All">All Roles</option>
                <option value="Teaching Staff">Teaching Staff</option>
                <option value="Non Teaching Staff">Non-Teaching Staff</option>
                <option value="Retired">Retired</option>
              </select>
            </div>
            
            <!-- Admin Bulk Delete Actions -->
            <div id="bulkActionContainer" style="display:none;" class="d-flex align-items-center gap-3 ml-4">
              <span class="text-sm font-medium"><span id="selectedCount">0</span> selected</span>
              <button class="btn btn-danger" id="bulkDeleteBtn" onclick="openDeleteModal()" disabled>Delete</button>
              <button class="btn btn-outline" onclick="clearSelection()">Cancel</button>
            </div>
          </div>
        </div>
        
        <div class="staff-grid" id="staffContainer">
          <!-- Staff cards injected here -->
        </div>
      </div>
      
    </main>
  </div>
  
  <!-- Delete Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-content">
      <h3 class="text-h3 mb-4">Confirm Deletion</h3>
      <p class="text-body mb-8">Are you sure you want to delete the selected staff members? This action cannot be undone.</p>
      <div class="d-flex align-items-center justify-content-between">
        <button class="btn btn-outline" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="executeBulkDelete()">Delete Permanently</button>
      </div>
    </div>
  </div>

  <script>
    let allStaffData = [];
    let departments = {};
    let selectedDepartment = null;
    let isAdmin = false;
    let selectedStaffIds = new Set();
    
    // Abstracted Department Info
    const deptInfo = {
      'CSE': 'Computer Science',
      'ECE': 'Electronics',
      'CE': 'Civil Engineering',
      'ME': 'Mechanical',
      'AD': 'Administration',
      'EEE': 'Electrical',
      'MAT': 'Mathematics',
      'SH': 'Science & Humanities',
      'CA': 'Computer Applications'
    };
    
    // Abstract Color Palette for Avatars
    const avatarColors = ['#F59E0B', '#10B981', '#E05236', '#4B5563', '#111827'];
    
    function getAvatarColor(name) {
      if(!name) return avatarColors[0];
      return avatarColors[name.charCodeAt(0) % avatarColors.length];
    }
    
    function getInitials(name) {
      if(!name) return '?';
      const parts = name.trim().split(' ');
      if(parts.length > 1) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
      return name.charAt(0).toUpperCase();
    }
    
    function createAbbreviation(fullName) {
      if(!fullName) return 'UNK';
      const skip = ['and', 'of', 'the', '&'];
      const words = fullName.split(' ');
      if(words.length > 1) {
        let abbr = '';
        words.forEach(w => {
          if(w && !skip.includes(w.toLowerCase())) abbr += w[0].toUpperCase();
        });
        return abbr;
      }
      return fullName.substring(0,3).toUpperCase();
    }

    async function checkAdminStatus() {
      try {
        const user = firebase.auth().currentUser;
        if (!user) return false;
        const token = await user.getIdToken(true);
        const res = await fetch('/api/staff/test_admin_check', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        isAdmin = res.ok;
        if(isAdmin) {
          document.getElementById('adminBadgeContainer').style.display = 'block';
          document.getElementById('adminControlsBtn').style.display = 'block';
        }
      } catch(e) { console.error(e); isAdmin = false; }
    }

    async function loadStaffs() {
      try {
        const user = firebase.auth().currentUser;
        if (!user) return window.location.href = '/';
        
        document.getElementById('userSpan').textContent = user.email;
        await checkAdminStatus();
        
        const token = await user.getIdToken(true);
        const res = await fetch('/api/staffs', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        if(data.staffs) {
          allStaffData = data.staffs;
          processDepartments();
          renderDepartmentsGrid();
          renderSidebarNav();
          
          document.getElementById('loadingOverlay').style.display = 'none';
          document.getElementById('appWrapper').style.display = 'flex';
        }
      } catch(e) {
        console.error(e);
        alert("Failed to load directory.");
      }
    }
    
    function processDepartments() {
      departments = {};
      allStaffData.forEach(s => {
        const dept = s.department || 'Unassigned';
        const abbr = createAbbreviation(dept);
        departments[abbr] = dept;
      });
    }
    
    function renderSidebarNav() {
      const nav = document.getElementById('deptNavList');
      let html = `<li><button class="nav-item active" id="nav-All Departments" onclick="showStaffList('All Departments')">All Departments</button></li>`;
      Object.keys(departments).sort().forEach(abbr => {
        html += `<li><button class="nav-item" id="nav-${abbr}" onclick="showStaffList('${abbr}')">${abbr}</button></li>`;
      });
      nav.innerHTML = html;
    }
    
    function renderDepartmentsGrid() {
      const grid = document.getElementById('departmentsGrid');
      let html = '';
      
      Object.keys(departments).sort().forEach(abbr => {
        const fullName = departments[abbr];
        const count = allStaffData.filter(s => s.department === fullName).length;
        
        html += `
          <div class="glass-card" style="cursor:pointer;" onclick="showStaffList('${abbr}')">
            <h3 class="text-h3 mb-2">${abbr}</h3>
            <p class="text-sm mb-4" style="min-height:40px;">${fullName}</p>
            <span class="badge badge-neutral">${count} Members</span>
          </div>
        `;
      });
      grid.innerHTML = html;
    }
    
    function showDepartments() {
      selectedDepartment = null;
      document.getElementById('globalSearchInput').value = '';
      document.getElementById('departmentsView').style.display = 'block';
      document.getElementById('staffView').style.display = 'none';
      
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    }
    
    function showStaffList(deptAbbr) {
      selectedDepartment = deptAbbr;
      clearSelection();
      
      document.getElementById('departmentsView').style.display = 'none';
      document.getElementById('staffView').style.display = 'block';
      
      document.getElementById('staffSearchInput').value = '';
      document.getElementById('typeFilter').value = 'All';
      
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const activeNav = document.getElementById('nav-' + deptAbbr);
      if(activeNav) activeNav.classList.add('active');
      
      document.getElementById('departmentTitle').textContent = deptAbbr === 'All Departments' ? 'All Directory' : (departments[deptAbbr] || deptAbbr);
      
      if(isAdmin) document.getElementById('bulkActionContainer').style.display = 'flex';
      
      filterStaff();
    }
    
    function handleGlobalSearch(query) {
      if(query.length > 0) {
        showStaffList('All Departments');
        document.getElementById('staffSearchInput').value = query;
        filterStaff();
      } else {
        showDepartments();
      }
    }
    
    function filterStaff() {
      const query = document.getElementById('staffSearchInput').value.toLowerCase();
      const type = document.getElementById('typeFilter').value;
      
      const filtered = allStaffData.filter(s => {
        const matchesSearch = !query || 
          (s.name || '').toLowerCase().includes(query) ||
          (s.email || '').toLowerCase().includes(query);
          
        const matchesDept = selectedDepartment === 'All Departments' || !selectedDepartment || departments[selectedDepartment] === s.department;
        
        const matchesType = type === 'All' || s.type === type;
        
        return matchesSearch && matchesDept && matchesType;
      });
      
      document.getElementById('staffCountBadge').textContent = filtered.length;
      renderStaffGrid(filtered);
    }
    
    function renderStaffGrid(staffList) {
      const container = document.getElementById('staffContainer');
      if(staffList.length === 0) {
        container.innerHTML = '<p class="text-body">No staff members found.</p>';
        return;
      }
      
      let html = '';
      staffList.forEach(s => {
        const id = s.id || s.email;
        const color = getAvatarColor(s.name);
        const initials = getInitials(s.name);
        const isSelected = selectedStaffIds.has(id);
        const cardClass = isSelected ? 'staff-card selected' : 'staff-card';
        const typeBadge = s.type === 'Teaching Staff' ? 'badge-emerald' : 
                          s.type === 'Retired' ? 'badge-neutral' : 'badge-gold';
                          
        html += `
          <div class="${cardClass}" ${isAdmin ? `onclick="toggleSelection('${id}')" style="cursor:pointer;"` : ''}>
            <div class="staff-card-header">
              <div class="avatar" style="background:${color}">${initials}</div>
              <div class="staff-info">
                <h4>${s.name || 'Unknown'}</h4>
                <p>${s.designation || 'Staff Member'}</p>
              </div>
            </div>
            
            <div class="mt-4">
              <p class="text-sm mb-2"><strong>Email:</strong> ${s.email || 'N/A'}</p>
              <p class="text-sm mb-4"><strong>Phone:</strong> ${s.mobileNo || s.Phone || 'N/A'}</p>
              <div class="d-flex gap-2 flex-wrap">
                <span class="badge ${typeBadge}">${s.type || 'Unknown Type'}</span>
                <span class="badge badge-neutral">${s.department ? createAbbreviation(s.department) : 'No Dept'}</span>
              </div>
            </div>
            
            ${isSelected ? '<div style="position:absolute; top:16px; right:16px; width:20px; height:20px; background:var(--accent-gold); border-radius:50%; display:flex; align-items:center; justify-content:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg></div>' : ''}
          </div>
        `;
      });
      container.innerHTML = html;
    }
    
    function toggleSelection(id) {
      if(!isAdmin) return;
      if(selectedStaffIds.has(id)) selectedStaffIds.delete(id);
      else selectedStaffIds.add(id);
      
      document.getElementById('selectedCount').textContent = selectedStaffIds.size;
      document.getElementById('bulkDeleteBtn').disabled = selectedStaffIds.size === 0;
      filterStaff();
    }
    
    function clearSelection() {
      selectedStaffIds.clear();
      if(isAdmin) {
        document.getElementById('selectedCount').textContent = '0';
        document.getElementById('bulkDeleteBtn').disabled = true;
      }
      filterStaff();
    }
    
    function openDeleteModal() { document.getElementById('deleteModal').classList.add('active'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); }
    
    async function executeBulkDelete() {
      if(selectedStaffIds.size === 0) return;
      
      try {
        const user = firebase.auth().currentUser;
        const token = await user.getIdToken(true);
        const idsArray = Array.from(selectedStaffIds);
        
        // This simulates bulk deletion endpoint if it existed, otherwise sequential
        for(const id of idsArray) {
          await fetch(`/api/staff/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
          });
        }
        
        closeDeleteModal();
        clearSelection();
        await loadStaffs();
      } catch(e) {
        console.error(e);
        alert('Failed to delete some records.');
      }
    }
    
  </script>
</body>
</html>
