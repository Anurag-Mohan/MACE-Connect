<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Registration - MACE-Connect</title>
  
  <link href="/static/css/design-system.css" rel="stylesheet">
  
  <style>
    .registration-layout {
      display: flex;
      min-height: 100vh;
      background: var(--bg-page);
    }
    
    .registration-form-side {
      flex: 1;
      padding: var(--space-8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .registration-visual-side {
      flex: 1;
      background: var(--text-primary);
      display: none;
      position: relative;
      overflow: hidden;
    }
    
    @media (min-width: 992px) {
      .registration-visual-side { display: flex; }
    }
    
    .form-container {
      width: 100%;
      max-width: 500px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-sm);
    }
    
    .visual-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      text-align: center;
      padding: var(--space-8);
      z-index: 10;
      color: white;
    }
    
    .grid-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }
    
    .floating-circle {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-emerald) 0%, transparent 70%);
      opacity: 0.3;
      top: 20%; left: 20%;
      filter: blur(40px);
    }
    
    .two-col-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }
    
    @media (max-width: 576px) {
      .two-col-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="registration-layout animate-slide-up">
    
    <!-- Left: Form Container -->
    <div class="registration-form-side">
      <div class="form-container">
        
        <a href="/login.html" style="text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); margin-bottom: var(--space-6); font-weight: 500;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to Login
        </a>
        
        <h1 class="text-h2 mb-2">Create Account</h1>
        <p class="text-body mb-8">Register to access the MACE-Connect staff portal.</p>
        
        <form id="regForm" onsubmit="handleRegistration(event)">
          
          <div class="two-col-group">
            <div class="form-group">
              <label class="label">Full Name</label>
              <input type="text" class="input-field" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
              <label class="label">Employee ID</label>
              <input type="text" class="input-field" placeholder="EMP-1234" required>
            </div>
          </div>
          
          <div class="form-group">
            <label class="label">Email Address</label>
            <input type="email" class="input-field" placeholder="name@mace.edu.in" required>
          </div>
          
          <div class="two-col-group">
            <div class="form-group">
              <label class="label">Department</label>
              <select class="input-field" required>
                <option value="">Select Department</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Electronics">Electronics</option>
                <option value="Civil Engineering">Civil Engineering</option>
                <option value="Mechanical">Mechanical Engineering</option>
                <option value="Administration">Administration</option>
              </select>
            </div>
            
            <div class="form-group">
              <label class="label">Role</label>
              <select class="input-field" required>
                <option value="">Select Role</option>
                <option value="Teaching Staff">Teaching Staff</option>
                <option value="Non Teaching Staff">Non-Teaching Staff</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label class="label">Password</label>
            <input type="password" class="input-field" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-100 mt-6" id="regBtn">
            Complete Registration
          </button>
          
        </form>
      </div>
    </div>
    
    <!-- Right: Visual Side -->
    <div class="registration-visual-side">
      <div class="grid-bg"></div>
      <div class="floating-circle"></div>
      
      <div class="visual-content">
        <h2 class="text-h1 mb-4" style="color:white;">MACE-Connect</h2>
        <p style="font-size: 1.125rem; color: rgba(255,255,255,0.7); max-width: 400px; margin: 0 auto;">
          The next generation staff directory and portal. Connect, collaborate, and manage seamlessly.
        </p>
      </div>
    </div>
    
  </div>
  
  <script>
    function handleRegistration(e) {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';
      
      // Simulate API call since firebase logic wasn't fully in this template originally
      setTimeout(() => {
        alert("Registration simulated. In production, this connects to Firebase.");
        btn.disabled = false;
        btn.textContent = 'Complete Registration';
        window.location.href = '/login.html';
      }, 1500);
    }
  </script>
</body>
</html>
