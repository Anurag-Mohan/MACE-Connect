<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Portal - Registration Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/design-system.css" rel="stylesheet">
  <style>
    body {
      background: var(--page-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      position: relative;
    }

    .registration-card {
      width: 100%;
      max-width: 640px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 3rem 2.5rem;
      position: relative;
    }

    .card-header-pro {
      text-align: center;
      margin-bottom: 2rem;
    }

    .card-header-pro .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.625rem;
      font-family: var(--font-header);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 0.75rem;
      text-decoration: none;
    }

    .card-header-pro .brand-logo .brand-dot {
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--primary);
    }

    .info-box {
      background: var(--warning-bg);
      border: 1px solid var(--primary-border);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      font-size: 0.8125rem;
      color: var(--gray-700);
      margin: 1.5rem 0;
      display: flex;
      align-items: start;
      gap: 0.75rem;
    }

    .info-box i {
      color: var(--primary);
      margin-top: 0.15rem;
    }
  </style>
</head>
<body>

  <!-- Floating abstract background glow colors -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="registration-card animate-fade-up">
    <div class="card-header-pro">
      <a href="/" class="brand-logo">
        <span class="brand-dot"></span>
        <span>MACE Connect</span>
      </a>
      <h3 class="fw-bold text-dark">Staff Registration</h3>
      <p class="text-muted text-sm mt-1">Submit your profile credentials for administrative verification</p>
    </div>

    <form id="registrationForm">
      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="name" class="label-pro">Full Name <span class="text-danger">*</span></label>
          <input type="text" class="input-pro" id="name" name="name" required placeholder="e.g. John Doe">
        </div>
        <div class="col-md-6 mb-3">
          <label for="emp_no" class="label-pro">Employee ID</label>
          <input type="text" class="input-pro" id="emp_no" name="emp_no" placeholder="Optional">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="reg_email" class="label-pro">Email Address <span class="text-danger">*</span></label>
          <input type="email" class="input-pro" id="reg_email" name="email" required placeholder="you@mace.ac.in">
        </div>
        <div class="col-md-6 mb-3">
          <label for="mobile_no" class="label-pro">Mobile Number <span class="text-danger">*</span></label>
          <input type="tel" class="input-pro" id="mobile_no" name="mobile_no" required placeholder="10-digit number">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="department" class="label-pro">Department <span class="text-danger">*</span></label>
          <select class="input-pro form-select" id="department" name="department" required>
            <option value="">Select Department</option>
            <option value="Electronics and Communication Engineering">Electronics & Communication</option>
            <option value="Civil Engineering">Civil Engineering</option>
            <option value="Mechanical Engineering">Mechanical Engineering</option>
            <option value="Computer Science and Engineering">Computer Science & Engineering</option>
            <option value="Administrative">Administrative</option>
            <option value="Electrical and Electronics Engineering">Electrical & Electronics</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Science and Humanities">Science & Humanities</option>
            <option value="Computer Applications">Computer Applications</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label for="designation" class="label-pro">Designation <span class="text-danger">*</span></label>
          <input type="text" class="input-pro" id="designation" name="designation" placeholder="e.g. Assistant Professor" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="type" class="label-pro">Staff Type</label>
          <select class="input-pro form-select" id="type" name="type">
            <option value="">Select Type</option>
            <option value="Teaching Staff">Teaching Staff</option>
            <option value="Non Teaching Staff">Non Teaching Staff</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <label for="contract_type" class="label-pro">Contract Type</label>
          <select class="input-pro form-select" id="contract_type" name="contract_type">
            <option value="">Select Contract Type</option>
            <option value="Permanent">Permanent</option>
            <option value="Contract">Contract</option>
            <option value="Temporary">Temporary</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="category" class="label-pro">Category</label>
          <input type="text" class="input-pro" id="category" name="category" placeholder="e.g. Assistant Professor">
        </div>
        <div class="col-md-6 mb-3">
          <label for="gender" class="label-pro">Gender</label>
          <select class="input-pro form-select" id="gender" name="gender">
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="blood_group" class="label-pro">Blood Group</label>
          <select class="input-pro form-select" id="blood_group" name="blood_group">
            <option value="">Select Blood Group</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label for="permanent_address" class="label-pro">Permanent Address</label>
        <textarea class="input-pro" id="permanent_address" name="permanent_address" rows="3" placeholder="Enter home address..."></textarea>
      </div>

      <div class="info-box">
        <i class="fas fa-info-circle"></i>
        <div>
          <strong>Note:</strong> Your registration request will be reviewed by the portal administrator. You will be notified via email once approved.
        </div>
      </div>

      <div id="regErrorMsg" class="alert alert-danger d-none mb-3 text-xs fw-medium rounded-3"></div>
      <div id="regSuccessMsg" class="alert alert-success d-none mb-3 text-xs fw-medium rounded-3"></div>
      
      <div class="d-flex gap-3 mt-4">
        <a href="/" class="btn-pro btn-outline w-50">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
        <button type="submit" class="btn-pro btn-primary w-50" id="submitBtn">
          <i class="fas fa-paper-plane"></i> Submit Request
        </button>
      </div>
    </form>
  </div>

  <script>
    // Handle registration form submission
    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1.5"></span> Submitting...';
      hideRegMessages();
      
      const formData = {
          name: document.getElementById('name').value.trim(),
          emp_no: document.getElementById('emp_no').value.trim(),
          email: document.getElementById('reg_email').value.trim(),
          mobile_no: document.getElementById('mobile_no').value.trim(),
          department: document.getElementById('department').value,
          designation: document.getElementById('designation').value.trim(),
          type: document.getElementById('type').value,
          contract_type: document.getElementById('contract_type').value,
          category: document.getElementById('category').value.trim(),
          gender: document.getElementById('gender').value,
          blood_group: document.getElementById('blood_group').value,
          permanent_address: document.getElementById('permanent_address').value.trim()
      };
      
      if (!formData.name || !formData.email || !formData.mobile_no || 
          !formData.department || !formData.designation) {
          showRegError('Please fill in all required fields');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          return;
      }
      
      try {
          const response = await fetch('/api/submit_registration', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json',
              },
              body: JSON.stringify(formData)
          });
          
          const result = await response.json();
          
          if (result.success) {
              showRegSuccess(result.message);
              this.reset();
              setTimeout(() => {
                  window.location.href = '/';
              }, 3000);
          } else {
              showRegError(result.error || 'Registration failed. Please try again.');
          }
      } catch (error) {
          console.log('Registration error:', error);
          showRegError('Network error. Please try again.');
      } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
      }
    });

    function showRegError(message) {
      const errorMsg = document.getElementById('regErrorMsg');
      const successMsg = document.getElementById('regSuccessMsg');
      errorMsg.textContent = message;
      errorMsg.classList.remove('d-none');
      successMsg.classList.add('d-none');
    }

    function showRegSuccess(message) {
      const errorMsg = document.getElementById('regErrorMsg');
      const successMsg = document.getElementById('regSuccessMsg');
      successMsg.textContent = message;
      successMsg.classList.remove('d-none');
      errorMsg.classList.add('d-none');
    }

    function hideRegMessages() {
      document.getElementById('regErrorMsg').classList.add('d-none');
      document.getElementById('regSuccessMsg').classList.add('d-none');
    }
  </script>
</body>
</html>
