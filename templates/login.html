<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACE Staff Portal - Login & Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/design-system.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/static/js/firebase-client.js"></script>
  <script src="/static/js/mesh-background.js"></script>
  <style>
    body {
      background: var(--page-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 460px;
      margin: 2rem auto;
      padding: 0 1rem;
      position: relative;
      z-index: 10;
      transition: max-width 0.35s ease;
    }

    .auth-wrapper.expanded {
      max-width: 680px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .auth-header {
      padding: 2rem 2rem 0;
      text-align: center;
    }

    .auth-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }

    .auth-brand .dot {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
    }

    .auth-subtitle {
      font-size: 0.8125rem;
      color: var(--gray-500);
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .auth-body {
      padding: 0 2rem 2rem;
    }

    .tab-bar {
      margin-bottom: 1.5rem;
    }

    .input-group-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      cursor: pointer;
      color: var(--gray-400);
      z-index: 10;
      font-size: 0.875rem;
      transition: color 0.15s ease;
    }

    .password-toggle:hover {
      color: var(--primary);
    }

    .alert {
      border: none;
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      font-weight: 500;
      font-size: 0.8125rem;
    }

    .alert-danger {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .alert-success {
      background: var(--success-bg);
      color: var(--success);
    }

    .info-box {
      background: var(--warning-bg);
      border: 1px solid rgba(217, 119, 6, 0.15);
      border-radius: var(--radius-md);
      padding: 0.875rem 1rem;
      font-size: 0.8125rem;
      color: var(--gray-700);
      margin: 1.25rem 0;
    }

    .auth-footer {
      text-align: center;
      padding: 1.5rem 0 0;
      color: var(--gray-400);
      font-size: 0.75rem;
    }

    @media (max-width: 768px) {
      .auth-wrapper,
      .auth-wrapper.expanded {
        max-width: 100%;
      }
      .auth-body { padding: 0 1.25rem 1.5rem; }
      .auth-header { padding: 1.5rem 1.25rem 0; }
    }
  </style>
</head>
<body class="tech-grid">

  <!-- Futuristic Blueprint Tech Doodles -->
  <svg class="futur-doodle" style="top: 10%; left: 5%; width: 220px; height: 220px;" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="2 2" />
    <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="0.5" />
    <line x1="50" y1="0" x2="50" y2="100" stroke="currentColor" stroke-width="0.25" />
    <line x1="0" y1="50" x2="100" y2="50" stroke="currentColor" stroke-width="0.25" />
    <path d="M 20 20 L 25 20 L 25 25" fill="none" stroke="currentColor" stroke-width="0.5" />
    <path d="M 80 20 L 75 20 L 75 25" fill="none" stroke="currentColor" stroke-width="0.5" />
    <path d="M 20 80 L 25 80 L 25 75" fill="none" stroke="currentColor" stroke-width="0.5" />
    <path d="M 80 80 L 75 80 L 75 75" fill="none" stroke="currentColor" stroke-width="0.5" />
  </svg>
  <svg class="futur-doodle d-none d-lg-block" style="bottom: 10%; right: 5%; width: 280px; height: 280px;" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="0.5" />
    <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="1 8" />
    <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="0.25" />
    <rect x="25" y="25" width="50" height="50" fill="none" stroke="currentColor" stroke-width="0.25" stroke-dasharray="4 4" transform="rotate(45 50 50)" />
    <line x1="10" y1="10" x2="90" y2="90" stroke="currentColor" stroke-width="0.25" />
  </svg>

  <div class="auth-wrapper" id="authWrapper">
    <div class="auth-card hud-bracket neon-glow">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-brand">
          <span class="dot"></span>
          MACE Connect
        </div>
        <div class="auth-subtitle">Staff Portal &mdash; Sign in to your account</div>

        <!-- Tab Bar -->
        <div class="tab-bar">
          <button type="button" class="tab-bar-item active" id="loginTabBtn" onclick="switchAuthTab('login')">
            Sign In
          </button>
          <button type="button" class="tab-bar-item" id="registerTabBtn" onclick="switchAuthTab('register')">
            Register
          </button>
        </div>
      </div>

      <div class="auth-body">
        <!-- Hidden Native Bootstrap tabs for trigger mechanism safety -->
        <ul class="nav nav-tabs" id="authTabs" role="tablist" style="display: none;">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" aria-controls="login" aria-selected="true"></button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab" aria-controls="register" aria-selected="false"></button>
          </li>
        </ul>
        
        <div class="tab-content" id="authTabsContent">
          <!-- Login Tab -->
          <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
            <form id="loginForm">
              <div class="mb-3">
                <label for="email" class="label-pro">Email Address</label>
                <input type="email" id="email" class="input-pro" placeholder="you@mace.ac.in" required>
              </div>
              
              <div class="mb-3">
                <label for="password" class="label-pro">Password</label>
                <div class="input-group-container">
                  <input type="password" id="password" class="input-pro" placeholder="Enter your password" required style="padding-right: 2.5rem;">
                  <span class="password-toggle" id="togglePassword">
                    <i class="fas fa-eye"></i>
                  </span>
                </div>
              </div>
              
              <div id="errorMsg" class="alert alert-danger d-none mb-3"></div>
              <div id="successMsg" class="alert alert-success d-none mb-3"></div>
              
              <button class="btn-pro btn-primary w-100 btn-lg" type="submit" id="loginButton">
                <span id="buttonText">Sign In</span>
                <span id="buttonSpinner" class="spinner-border d-none" style="width: 1rem; height: 1rem; border-width: 0.15em;" role="status"></span>
              </button>
            </form>
          </div>
          
          <!-- Registration Tab -->
          <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
            <form id="registrationForm" class="registration-form">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="name" class="label-pro">Full Name <span class="text-danger">*</span></label>
                  <input type="text" class="input-pro" id="name" name="name" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="emp_no" class="label-pro">Employee Number <span class="text-danger">*</span></label>
                  <input type="text" class="input-pro" id="emp_no" name="emp_no">
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="reg_email" class="label-pro">Email Address <span class="text-danger">*</span></label>
                  <input type="email" class="input-pro" id="reg_email" name="email" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="mobile_no" class="label-pro">Mobile Number <span class="text-danger">*</span></label>
                  <input type="tel" class="input-pro" id="mobile_no" name="mobile_no" required>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="department" class="label-pro">Department <span class="text-danger">*</span></label>
                  <select class="input-pro form-select" id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option value="Electronics and Communication Engineering">Electronics & Communication</option>
                    <option value="Civil Engineering">Civil Engineering</option>
                    <option value="Mechanical Engineering">Mechanical Engineering</option>
                    <option value="Computer Science and Engineering">Computer Science & Engineering</option>
                    <option value="Administrative">Administrative</option>
                    <option value="Electrical and Electronics Engineering">Electrical & Electronics</option>
                    <option value="Mathematics">Mathematics</option>
                    <option value="Science and Humanities">Science & Humanities</option>
                    <option value="Computer Applications">Computer Applications</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="designation" class="label-pro">Designation <span class="text-danger">*</span></label>
                  <input type="text" class="input-pro" id="designation" name="designation" required>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="type" class="label-pro">Staff Type</label>
                  <select class="input-pro form-select" id="type" name="type">
                    <option value="">Select Type</option>
                    <option value="Teaching Staff">Teaching Staff</option>
                    <option value="Non Teaching Staff">Non Teaching Staff</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="contract_type" class="label-pro">Contract Type</label>
                  <select class="input-pro form-select" id="contract_type" name="contract_type">
                    <option value="">Select Contract Type</option>
                    <option value="Permanent">Permanent</option>
                    <option value="Contract">Contract</option>
                    <option value="Temporary">Temporary</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="category" class="label-pro">Category</label>
                  <input type="text" class="input-pro" id="category" name="category">
                </div>
                <div class="col-md-6 mb-3">
                  <label for="gender" class="label-pro">Gender</label>
                  <select class="input-pro form-select" id="gender" name="gender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="blood_group" class="label-pro">Blood Group</label>
                  <select class="input-pro form-select" id="blood_group" name="blood_group">
                    <option value="">Select Blood Group</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label for="permanent_address" class="label-pro">Permanent Address</label>
                <textarea class="input-pro" id="permanent_address" name="permanent_address" rows="3"></textarea>
              </div>

              <div class="info-box">
                <i class="fas fa-info-circle me-2" style="color: var(--primary);"></i>
                <strong>Note:</strong> Your registration will be reviewed by the admin. You will be notified once approved.
              </div>

              <div id="regErrorMsg" class="alert alert-danger d-none mb-3"></div>
              <div id="regSuccessMsg" class="alert alert-success d-none mb-3"></div>
              
              <button type="submit" class="btn-pro btn-primary w-100 btn-lg" id="submitBtn">
                <i class="fas fa-paper-plane me-2"></i>Submit Registration
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="auth-footer">
      Mar Athanasius College of Engineering &middot; Staff Portal v1.0
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Tab switching logic
    function switchAuthTab(tabName) {
      const loginTab = document.getElementById('login-tab');
      const registerTab = document.getElementById('register-tab');
      const wrapper = document.getElementById('authWrapper');
      
      if (tabName === 'login') {
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('registerTabBtn').classList.remove('active');
        wrapper.classList.remove('expanded');
        const tabTrigger = new bootstrap.Tab(loginTab);
        tabTrigger.show();
      } else {
        document.getElementById('registerTabBtn').classList.add('active');
        document.getElementById('loginTabBtn').classList.remove('active');
        wrapper.classList.add('expanded');
        const tabTrigger = new bootstrap.Tab(registerTab);
        tabTrigger.show();
      }
    }

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Show loading state
    function showLoading() {
      document.getElementById('buttonText').classList.add('d-none');
      document.getElementById('buttonSpinner').classList.remove('d-none');
      document.getElementById('loginButton').disabled = true;
    }

    // Hide loading state
    function hideLoading() {
      document.getElementById('buttonText').classList.remove('d-none');
      document.getElementById('buttonSpinner').classList.add('d-none');
      document.getElementById('loginButton').disabled = false;
    }

    // Show error message
    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = message;
      errorMsg.classList.remove('d-none');
      successMsg.classList.add('d-none');
    }

    // Show success message
    function showSuccess(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      successMsg.textContent = message;
      successMsg.classList.remove('d-none');
      errorMsg.classList.add('d-none');
    }

    // Hide all messages
    function hideMessages() {
      document.getElementById('errorMsg').classList.add('d-none');
      document.getElementById('successMsg').classList.add('d-none');
    }

    // Registration message functions
    function showRegError(message) {
      const errorMsg = document.getElementById('regErrorMsg');
      const successMsg = document.getElementById('regSuccessMsg');
      errorMsg.textContent = message;
      errorMsg.classList.remove('d-none');
      successMsg.classList.add('d-none');
    }

    function showRegSuccess(message) {
      const errorMsg = document.getElementById('regErrorMsg');
      const successMsg = document.getElementById('regSuccessMsg');
      successMsg.textContent = message;
      successMsg.classList.remove('d-none');
      errorMsg.classList.add('d-none');
    }

    // Hide registration messages
    function hideRegMessages() {
      document.getElementById('regErrorMsg').classList.add('d-none');
      document.getElementById('regSuccessMsg').classList.add('d-none');
    }

    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }

      if (!email.includes('@')) {
        showError('Please enter a valid email');
        return;
      }

      showLoading();
      hideMessages();
      
      try {
        await signInWithEmailAndPassword(email, password);
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        const currentUser = firebase.auth().currentUser;
        if (currentUser) {
          const isAdmin = await checkAdminStatus(currentUser);
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => {
            if (isAdmin) {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/staff_list.html';
            }
          }, 1000);
        } else {
          showError('Login failed. Please try again.');
        }
      } catch (error) {
        console.log('Login error:', error);
        showError('Invalid credentials');
      } finally {
        hideLoading();
      }
    });

    // Check if user is already logged in
    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        checkAdminStatus(user).then(isAdmin => {
          if (isAdmin) {
            window.location.href = '/admin.html';
          } else {
            window.location.href = '/staff_list.html';
          }
        }).catch(err => {
          console.log('Error checking user role:', err);
        });
      }
    });

    // Handle registration form submission
    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading-spinner-pro" style="display:inline-block;"></div> Submitting...';
      hideRegMessages();
      
      const formData = {
          name: document.getElementById('name').value.trim(),
          emp_no: document.getElementById('emp_no').value.trim(),
          email: document.getElementById('reg_email').value.trim(),
          mobile_no: document.getElementById('mobile_no').value.trim(),
          department: document.getElementById('department').value,
          designation: document.getElementById('designation').value.trim(),
          type: document.getElementById('type').value,
          contract_type: document.getElementById('contract_type').value,
          category: document.getElementById('category').value.trim(),
          gender: document.getElementById('gender').value,
          blood_group: document.getElementById('blood_group').value,
          permanent_address: document.getElementById('permanent_address').value.trim()
      };
      
      if (!formData.name || !formData.email || !formData.mobile_no || 
          !formData.department || !formData.designation) {
          showRegError('Please fill in all required fields');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          return;
      }
      
      try {
          const response = await fetch('/api/submit_registration', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json',
              },
              body: JSON.stringify(formData)
          });
          
          const result = await response.json();
          
          if (result.success) {
              showRegSuccess(result.message);
              this.reset();
              setTimeout(() => {
                  switchAuthTab('login');
              }, 3000);
          } else {
              showRegError(result.error || 'Registration failed. Please try again.');
          }
      } catch (error) {
          console.log('Registration error:', error);
          showRegError('Network error. Please try again.');
      } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
