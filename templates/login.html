<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MACE-Connect</title>
  
  <link href="/static/css/design-system.css" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="/static/js/firebase-client.js"></script>
  
  <style>
    .login-wrapper {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      padding: var(--space-4);
      position: relative;
      overflow: hidden;
    }
    
    .ambient-glow {
      position: absolute;
      width: 60vw;
      height: 60vw;
      max-width: 800px;
      max-height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-gold-light) 0%, transparent 70%);
      top: -20%;
      right: -20%;
      z-index: 0;
      pointer-events: none;
    }
    
    .ambient-glow-2 {
      position: absolute;
      width: 50vw;
      height: 50vw;
      max-width: 600px;
      max-height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-terracotta-light) 0%, transparent 70%);
      bottom: -10%;
      left: -10%;
      z-index: 0;
      pointer-events: none;
    }
    
    .login-card {
      width: 100%;
      max-width: 440px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    
    .brand-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    
    .brand-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: var(--accent-gold);
      border-radius: 50%;
      margin-bottom: var(--space-4);
    }
    
    .auth-error {
      display: none;
      background: var(--accent-terracotta-light);
      color: var(--accent-terracotta);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: var(--space-4);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>
    
    <div class="glass-card login-card animate-slide-up">
      <div class="brand-header">
        <span class="brand-dot"></span>
        <h1 class="text-h2">Welcome back</h1>
        <p class="text-body mt-2">Sign in to your MACE-Connect account.</p>
      </div>
      
      <div id="authError" class="auth-error"></div>
      
      <form id="authForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="label" for="emailInput">Email Address</label>
          <input type="email" id="emailInput" class="input-field" placeholder="name@mace.edu.in" required>
        </div>
        
        <div class="form-group">
          <label class="label" for="passwordInput">Password</label>
          <input type="password" id="passwordInput" class="input-field" placeholder="••••••••" required>
        </div>
        
        <div class="form-group mt-8">
          <button type="submit" id="loginBtn" class="btn btn-primary w-100">
            Sign In
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const btn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('authError');
      
      try {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div>';
        errDiv.style.display = 'none';
        
        await signInWithEmailAndPassword(email, password);
        window.location.href = '/staff_list.html';
        
      } catch (error) {
        console.error(error);
        errDiv.textContent = 'Invalid credentials or network error.';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
