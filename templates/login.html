<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MACE Staff Portal - Login & Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/design-system.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/static/js/firebase-client.js"></script>
  <script src="/static/js/mesh-background.js"></script>
  <style>
    body {
      background: radial-gradient(circle at 0% 0%, #FFFBEB 0%, #FAF9F6 50%, #FEF3C7 100%);
    }

    .login-wrapper {
      display: flex;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      gap: 4rem;
      padding: 4rem 2rem;
      align-items: center;
      position: relative;
      z-index: 10;
      min-height: 100vh;
    }

    /* Left Panel - Dynamic HTML Network Mockup */
    .left-panel {
      flex: 1.3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #374151;
      padding: 2rem;
      position: relative;
    }

    .network-container {
      position: relative;
      width: 100%;
      max-width: 440px;
      height: 340px;
      margin-bottom: 2rem;
    }

    /* Central Access Ring */
    .portal-hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      border: 4px solid var(--primary-color);
      box-shadow: 0 10px 25px rgba(217, 119, 6, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: var(--primary-color);
      z-index: 10;
      animation: hub-pulse 3s infinite ease-in-out;
    }

    @keyframes hub-pulse {
      0% { transform: translate(-50%, -50%) scale(0.95); box-shadow: 0 0 0 0 rgba(217, 119, 6, 0.4); }
      70% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 0 20px rgba(217, 119, 6, 0); }
      100% { transform: translate(-50%, -50%) scale(0.95); box-shadow: 0 0 0 0 rgba(217, 119, 6, 0); }
    }

    /* Floating Profile Nodes */
    .network-node {
      position: absolute;
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 18px;
      border: 3px solid white;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 1.1rem;
      animation: node-bob 6s ease-in-out infinite alternate;
    }

    .node-1 { top: 10%; left: 10%; background: var(--primary-color); animation-delay: 0s; }
    .node-2 { top: 15%; right: 10%; background: var(--accent-green); animation-delay: 1.5s; }
    .node-3 { bottom: 10%; left: 15%; background: var(--accent-teal); animation-delay: 0.7s; }
    .node-4 { bottom: 12%; right: 15%; background: var(--accent-purple); animation-delay: 2.2s; }

    @keyframes node-bob {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-15px) rotate(8deg); }
    }

    /* Connector Rays */
    .network-ray {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, var(--primary-color), transparent);
      transform-origin: left center;
      z-index: 5;
      opacity: 0.4;
    }

    .ray-1 { transform: rotate(210deg) translateX(50px); }
    .ray-2 { transform: rotate(-30deg) translateX(50px); }
    .ray-3 { transform: rotate(135deg) translateX(50px); }
    .ray-4 { transform: rotate(45deg) translateX(50px); }

    .welcome-text h1 {
      font-size: 3rem;
      font-weight: 800;
      color: #78350F;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
    }

    .welcome-text p {
      font-size: 1.15rem;
      font-weight: 400;
      color: #6B7280;
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Right Panel - Login Form Stack */
    .right-panel {
      flex: 0 0 460px;
    }

    .login-header {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-gold) 100%);
      color: white;
      padding: 2.2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-radius: 26px 26px 0 0;
    }

    .login-header .icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
    }

    .login-header h2 {
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }

    .login-header p {
      font-size: 0.925rem;
      opacity: 0.9;
      margin-bottom: 0;
    }

    .card-body {
      padding: 2.2rem;
    }

    /* Password eye alignment */
    .input-group-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-toggle {
      position: absolute;
      right: 18px;
      cursor: pointer;
      color: #9CA3AF;
      z-index: 10;
      font-size: 1.1rem;
      transition: color 0.2s ease;
    }

    .password-toggle:hover {
      color: var(--primary-color);
    }

    .alert {
      border: none;
      border-radius: 16px;
      padding: 1rem 1.25rem;
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: var(--shadow-inset-3d);
    }

    .alert-danger {
      background: #FEE2E2;
      color: var(--accent-red-dark);
    }

    .alert-success {
      background: #D1FAE5;
      color: var(--accent-green-dark);
    }

    .info-alert {
      background: #FFFBEB;
      border-radius: 16px;
      padding: 1.25rem;
      border-left: 4px solid var(--primary-color);
      margin: 1.5rem 0;
      font-size: 0.925rem;
      color: #78350F;
      box-shadow: 0 4px 12px rgba(217, 119, 6, 0.05);
    }

    .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive adjustments */
    @media (max-width: 992px) {
      .login-wrapper {
        flex-direction: column;
        gap: 3rem;
        padding: 3rem 1rem;
      }
      
      .left-panel {
        order: 2;
        padding: 1rem;
      }
      
      .welcome-text h1 {
        font-size: 2.25rem;
      }
      
      .right-panel {
        width: 100%;
        max-width: 460px;
        order: 1;
      }
    }
  </style>
</head>
<body>

  <!-- Mesh Constellation background is animated dynamically via canvas -->

  <div class="container-fluid">
    <div class="login-wrapper">
      <!-- Left Panel - Dynamic Network Mockup -->
      <div class="left-panel">
        <div class="network-container">
          <!-- Central Hub -->
          <div class="portal-hub">
            <i class="fas fa-graduation-cap"></i>
          </div>
          <!-- Surrounding Staff Nodes -->
          <div class="network-node node-1" title="John Doe">JD</div>
          <div class="network-node node-2" title="Jane Smith">JS</div>
          <div class="network-node node-3" title="Anurag Mohan">AM</div>
          <div class="network-node node-4" title="Kelly T">KT</div>
          
          <!-- Connections -->
          <div class="network-ray ray-1"></div>
          <div class="network-ray ray-2"></div>
          <div class="network-ray ray-3"></div>
          <div class="network-ray ray-4"></div>
        </div>
        <div class="welcome-text">
          <h1>Welcome to MACE</h1>
          <p>Access your staff portal with secure authentication and manage your profile seamlessly.</p>
        </div>
      </div>

      <!-- Right Panel - Login Card Deck -->
      <div class="right-panel">
        <div class="card-deck-3d">
          <div class="card-stacked-3d">
            <div class="login-header">
              <div class="icon">
                <i class="fas fa-key"></i>
              </div>
              <h2>MACE Staff Portal</h2>
              <p>Sign in or register to access your account</p>
            </div>
            
            <div class="card-body">
              <!-- Custom Sliding Capsule Selector -->
              <div class="tab-slider-container mb-4">
                <div class="tab-slider-indicator" id="tabIndicator"></div>
                <button type="button" class="tab-slider-btn active" id="loginTabBtn" onclick="switchAuthTab('login')">
                  <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
                <button type="button" class="tab-slider-btn" id="registerTabBtn" onclick="switchAuthTab('register')">
                  <i class="fas fa-user-plus me-2"></i>Register
                </button>
              </div>

              <!-- Hidden Native Bootstrap tabs for trigger mechanism safety -->
              <ul class="nav nav-tabs" id="authTabs" role="tablist" style="display: none;">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" aria-controls="login" aria-selected="true"></button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab" aria-controls="register" aria-selected="false"></button>
                </li>
              </ul>
              
              <div class="tab-content" id="authTabsContent">
                <!-- Login Tab -->
                <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                  <form id="loginForm">
                    <div class="mb-4">
                      <label for="email" class="label-3d">Email Address</label>
                      <input type="email" id="email" class="input-3d" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="mb-4">
                      <label for="password" class="label-3d">Password</label>
                      <div class="input-group-container">
                        <input type="password" id="password" class="input-3d" placeholder="Enter your password" required>
                        <span class="password-toggle" id="togglePassword">
                          <i class="fas fa-eye"></i>
                        </span>
                      </div>
                    </div>
                    
                    <div id="errorMsg" class="alert alert-danger d-none mb-4"></div>
                    <div id="successMsg" class="alert alert-success d-none mb-4"></div>
                    
                    <button class="btn-3d btn-3d-orange w-100" type="submit" id="loginButton">
                      <span id="buttonText">Sign In</span>
                      <span id="buttonSpinner" class="spinner-border d-none" style="width: 1.25rem; height: 1.25rem; border-width: 0.15em;" role="status"></span>
                    </button>
                  </form>
                </div>
                
                <!-- Registration Tab -->
                <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="register-tab">
                  <form id="registrationForm" class="registration-form">
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="name" class="label-3d">Full Name <span class="text-danger">*</span></label>
                        <input type="text" class="input-3d" id="name" name="name" required>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="emp_no" class="label-3d">Employee Number <span class="text-danger">*</span></label>
                        <input type="text" class="input-3d" id="emp_no" name="emp_no">
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="reg_email" class="label-3d">Email Address <span class="text-danger">*</span></label>
                        <input type="email" class="input-3d" id="reg_email" name="email" required>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="mobile_no" class="label-3d">Mobile Number <span class="text-danger">*</span></label>
                        <input type="tel" class="input-3d" id="mobile_no" name="mobile_no" required>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="department" class="label-3d">Department <span class="text-danger">*</span></label>
                        <select class="input-3d form-select" id="department" name="department" required>
                          <option value="">Select Department</option>
                          <option value="Electronics and Communication Engineering">Electronics & Communication</option>
                          <option value="Civil Engineering">Civil Engineering</option>
                          <option value="Mechanical Engineering">Mechanical Engineering</option>
                          <option value="Computer Science and Engineering">Computer Science & Engineering</option>
                          <option value="Administrative">Administrative</option>
                          <option value="Electrical and Electronics Engineering">Electrical & Electronics</option>
                          <option value="Mathematics">Mathematics</option>
                          <option value="Science and Humanities">Science & Humanities</option>
                          <option value="Computer Applications">Computer Applications</option>
                        </select>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="designation" class="label-3d">Designation <span class="text-danger">*</span></label>
                        <input type="text" class="input-3d" id="designation" name="designation" required>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="type" class="label-3d">Staff Type</label>
                        <select class="input-3d form-select" id="type" name="type">
                          <option value="">Select Type</option>
                          <option value="Teaching Staff">Teaching Staff</option>
                          <option value="Non Teaching Staff">Non Teaching Staff</option>
                        </select>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="contract_type" class="label-3d">Contract Type</label>
                        <select class="input-3d form-select" id="contract_type" name="contract_type">
                          <option value="">Select Contract Type</option>
                          <option value="Permanent">Permanent</option>
                          <option value="Contract">Contract</option>
                          <option value="Temporary">Temporary</option>
                        </select>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="category" class="label-3d">Category</label>
                        <input type="text" class="input-3d" id="category" name="category">
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="gender" class="label-3d">Gender</label>
                        <select class="input-3d form-select" id="gender" name="gender">
                          <option value="">Select Gender</option>
                          <option value="Male">Male</option>
                          <option value="Female">Female</option>
                          <option value="Other">Other</option>
                        </select>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="blood_group" class="label-3d">Blood Group</label>
                        <select class="input-3d form-select" id="blood_group" name="blood_group">
                          <option value="">Select Blood Group</option>
                          <option value="A+">A+</option>
                          <option value="A-">A-</option>
                          <option value="B+">B+</option>
                          <option value="B-">B-</option>
                          <option value="AB+">AB+</option>
                          <option value="AB-">AB-</option>
                          <option value="O+">O+</option>
                          <option value="O-">O-</option>
                        </select>
                      </div>
                    </div>

                    <div class="mb-3">
                      <label for="permanent_address" class="label-3d">Permanent Address</label>
                      <textarea class="input-3d" id="permanent_address" name="permanent_address" rows="3"></textarea>
                    </div>

                    <div class="info-alert">
                      <i class="fas fa-info-circle me-2"></i>
                      <strong>Important:</strong> Your registration will be reviewed by the admin. You will be notified once approved.
                    </div>

                    <div id="regErrorMsg" class="alert alert-danger d-none mb-4"></div>
                    <div id="regSuccessMsg" class="alert alert-success d-none mb-4"></div>
                    
                    <button type="submit" class="btn-3d btn-3d-orange w-100" id="submitBtn">
                      <i class="fas fa-paper-plane me-2"></i>Submit Registration
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Tab switching slider glide logic
    function switchAuthTab(tabName) {
      const loginTab = document.getElementById('login-tab');
      const registerTab = document.getElementById('register-tab');
      const indicator = document.getElementById('tabIndicator');
      
      if (tabName === 'login') {
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('registerTabBtn').classList.remove('active');
        indicator.style.transform = 'translateX(0)';
        const tabTrigger = new bootstrap.Tab(loginTab);
        tabTrigger.show();
      } else {
        document.getElementById('registerTabBtn').classList.add('active');
        document.getElementById('loginTabBtn').classList.remove('active');
        indicator.style.transform = 'translateX(100%)';
        const tabTrigger = new bootstrap.Tab(registerTab);
        tabTrigger.show();
      }
    }

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Show loading state
    function showLoading() {
      document.getElementById('buttonText').classList.add('d-none');
      document.getElementById('buttonSpinner').classList.remove('d-none');
      document.getElementById('loginButton').disabled = true;
    }

    // Hide loading state
    function hideLoading() {
      document.getElementById('buttonText').classList.remove('d-none');
      document.getElementById('buttonSpinner').classList.add('d-none');
      document.getElementById('loginButton').disabled = false;
    }

    // Show error message
    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.textContent = message;
      errorMsg.classList.remove('d-none');
      successMsg.classList.add('d-none');
    }

    // Show success message
    function showSuccess(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      successMsg.textContent = message;
      successMsg.classList.remove('d-none');
      errorMsg.classList.add('d-none');
    }

    // Hide all messages
    function hideMessages() {
      document.getElementById('errorMsg').classList.add('d-none');
      document.getElementById('successMsg').classList.add('d-none');
    }

    // Registration message functions
    function showRegError(message) {
      const errorMsg = document.getElementById('regErrorMsg');
      const successMsg = document.getElementById('regSuccessMsg');
      errorMsg.textContent = message;
      errorMsg.classList.remove('d-none');
      successMsg.classList.add('d-none');
    }

    function showRegSuccess(message) {
      const errorMsg = document.getElementById('regErrorMsg');
      const successMsg = document.getElementById('regSuccessMsg');
      successMsg.textContent = message;
      successMsg.classList.remove('d-none');
      errorMsg.classList.add('d-none');
    }

    // Hide registration messages
    function hideRegMessages() {
      document.getElementById('regErrorMsg').classList.add('d-none');
      document.getElementById('regSuccessMsg').classList.add('d-none');
    }

    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      
      if (!email || !password) {
        showError('Please enter both email and password');
        return;
      }

      if (!email.includes('@')) {
        showError('Please enter a valid email');
        return;
      }

      showLoading();
      hideMessages();
      
      try {
        await signInWithEmailAndPassword(email, password);
        await new Promise(resolve => setTimeout(resolve, 2000));
        
        const currentUser = firebase.auth().currentUser;
        if (currentUser) {
          const isAdmin = await checkAdminStatus(currentUser);
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => {
            if (isAdmin) {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/staff_list.html';
            }
          }, 1000);
        } else {
          showError('Login failed. Please try again.');
        }
      } catch (error) {
        console.log('Login error:', error);
        showError('Invalid credentials');
      } finally {
        hideLoading();
      }
    });

    // Check if user is already logged in
    firebase.auth().onAuthStateChanged((user) => {
      if (user) {
        checkAdminStatus(user).then(isAdmin => {
          if (isAdmin) {
            window.location.href = '/admin.html';
          } else {
            window.location.href = '/staff_list.html';
          }
        }).catch(err => {
          console.log('Error checking user role:', err);
        });
      }
    });

    // Handle registration form submission
    document.getElementById('registrationForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="loading-spinner"></div> Submitting...';
      hideRegMessages();
      
      const formData = {
          name: document.getElementById('name').value.trim(),
          emp_no: document.getElementById('emp_no').value.trim(),
          email: document.getElementById('reg_email').value.trim(),
          mobile_no: document.getElementById('mobile_no').value.trim(),
          department: document.getElementById('department').value,
          designation: document.getElementById('designation').value.trim(),
          type: document.getElementById('type').value,
          contract_type: document.getElementById('contract_type').value,
          category: document.getElementById('category').value.trim(),
          gender: document.getElementById('gender').value,
          blood_group: document.getElementById('blood_group').value,
          permanent_address: document.getElementById('permanent_address').value.trim()
      };
      
      if (!formData.name || !formData.email || !formData.mobile_no || 
          !formData.department || !formData.designation) {
          showRegError('Please fill in all required fields');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
          return;
      }
      
      try {
          const response = await fetch('/api/submit_registration', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json',
              },
              body: JSON.stringify(formData)
          });
          
          const result = await response.json();
          
          if (result.success) {
              showRegSuccess(result.message);
              this.reset();
              setTimeout(() => {
                  switchAuthTab('login');
              }, 3000);
          } else {
              showRegError(result.error || 'Registration failed. Please try again.');
          }
      } catch (error) {
          console.log('Registration error:', error);
          showRegError('Network error. Please try again.');
      } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
